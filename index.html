<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Бездна — совместный редактор квестов</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside id="left" class="side">
    <div class="row space"><h1>Бездна</h1><button class="btn drawerBtn" onclick="closePanels()">×</button></div>
    <p><b>Совместный редактор квестов и диалогов</b><br>линейная основа + ответвления + онлайн-сохранение</p>
    <div class="statgrid"><div class="stat"><b id="stNodes">0</b><span class="tiny">основа</span></div><div class="stat"><b id="stBranches">0</b><span class="tiny">ветки</span></div><div class="stat"><b id="stChoices">0</b><span class="tiny">выборы</span></div><div class="stat"><b id="stLinear">0%</b><span class="tiny">линейность</span></div></div>
    <div class="card"><div id="status">Запуск...</div><div id="online" class="online"></div><div class="row"><button class="btn" onclick="setName()">Имя</button><button class="btn" onclick="shareProject()">Ссылка проекта</button></div></div>
    <input id="search" class="field" placeholder="Поиск: Марра, долг, дверь...">
    <h2>Цепочка</h2><div id="list"></div>
  </aside>
  <main class="map">
    <div class="top">
      <div class="glass tab"><button class="active">Сюжет</button><button onclick="tab='quest';renderRight()">Квест</button><button onclick="tab='dialog';renderRight()">Диалог</button><button onclick="tab='play';renderRight()">Тест</button></div>
      <div class="glass row"><button class="btn gold" id="toolPan">🖐 Карта</button><button class="btn" id="toolEdit">✦ Редактор</button><button class="btn" id="zin">+</button><button class="btn" id="zout">-</button><button class="btn" id="reset">Сброс</button><button class="btn" id="center">К выбранному</button></div>
    </div>
    <div id="wrap" class="pan"><div id="canvas"><svg id="edges"></svg><div id="nodes"></div></div></div>
    <div class="legend"><span class="chip">основная линия</span><span class="chip blue">диалог</span><span class="chip green">возврат</span><span class="chip red">риск</span><span>H — карта, V — редактор, Space — двигать полотно</span></div>
  </main>
  <aside id="rightPanel" class="side right">
    <div class="row space"><div class="tab"><button onclick="tab='quest';renderRight()" class="active">Квест</button><button onclick="tab='dialog';renderRight()">Диалог</button><button onclick="tab='play';renderRight()">Тест</button></div><button class="btn drawerBtn" onclick="closePanels()">×</button></div>
    <div id="right"></div>
  </aside>
</div>
<div class="mobileBar"><button class="btn" onclick="openLeft()">☰ Список</button><button class="btn gold" onclick="setTool('pan')">🖐</button><button class="btn" onclick="setTool('edit')">✦</button><button class="btn" onclick="openRight()">Редактор</button></div>
<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
