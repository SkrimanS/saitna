adius:999px;padding:3px 7px;font-size:11px}.chip.blue{border-color:#74acd066;background:#74acd01c;color:#bde1f5}.chip.green{border-color:#8ab36b66;background:#8ab36b1c;color:#caebb2}.chip.red{border-color:#bd665866;background:#bd66581f;color:#f2c3ba}.map{position:relative;overflow:hidden;background:#03050844}.top{position:absolute;left:14px;right:14px;top:12px;z-index:6;display:flex;justify-content:space-between;pointer-events:none}.glass{pointer-events:auto;background:#0c1017cc;border:1px solid #d6a34a44;border-radius:15px;padding:7px}#wrap{position:absolute;inset:0;overflow:hidden;touch-action:none;background-image:linear-gradient(#ffffff08 1px,transparent 1px),linear-gradient(90deg,#ffffff08 1px,transparent 1px);background-size:42px 42px}#wrap.pan{cursor:grab}#wrap.edit .node{cursor:move}#canvas{position:absolute;width:2600px;height:1400px;transform-origin:0 0}svg{position:absolute;inset:0;width:2600px;height:1400px;overflow:visible;pointer-events:none}.node{position:absolute;width:245px;min-height:110px;border-radius:16px;padding:12px;background:linear-gradient(#222b39,#10151e);border:1px solid #634c2b;box-shadow:0 13px 28px #0008;user-select:none}.node.sel{border-color:#f2c568;box-shadow:0 0 0 3px #d6a34a33}.node.main:before{content:"";position:absolute;left:-1px;right:-1px;top:-1px;height:4px;border-radius:16px 16px 0 0;background:linear-gradient(90deg,#a97830,#f5c86c,#705023)}.node .type{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:#9fc4dc;margin-bottom:6px}.node .title{font-size:17px;color:#ffe0a0;font-weight:bold}.node .desc{font-size:12px;color:#c8ba96;line-height:1.35;max-height:49px;overflow:hidden}.legend{position:absolute;left:14px;bottom:14px;z-index:6;display:flex;gap:7px;flex-wrap:wrap;background:#0c1017cc;border:1px solid #d6a34a3b;border-radius:14px;padding:8px;color:var(--m);font-size:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.card{border:1px solid #d6a34a38;border-radius:14px;background:#ffffff08;padding:10px;margin:8px 0}.choice{border-left:3px solid var(--gr);padding:8px;margin:7px 0;background:#8ab36b12;border-radius:0 10px 10px 0}.play{border:1px solid #d6a34a42;border-radius:16px;padding:14px;background:#ffffff08}.choicebtn{display:block;width:100%;text-align:left;margin:7px 0}.log{font-family:Consolas,monospace;font-size:12px;color:#b8d0df;white-space:pre-wrap}.tiny{font-size:11px;color:#81735b}

<div class="app"><aside class="side"><h1>Бездна</h1><p><b>Редактор квестов и диалогов</b><br>линейная основа + ответвления</p><div class="statgrid"><div class="stat"><b id="stNodes">0</b><span class="tiny">основа</span></div><div class="stat"><b id="stBranches">0</b><span class="tiny">ветки</span></div><div class="stat"><b id="stChoices">0</b><span class="tiny">выборы</span></div><div class="stat"><b id="stLinear">0%</b><span class="tiny">линейность</span></div></div><input id="search" class="field" placeholder="Поиск: Марра, долг, дверь..."><h2>Цепочка</h2><div id="list"></div></aside><main class="map"><div class="top"><div class="glass tab"><button class="active">Сюжет</button><button onclick="tab='quest';renderRight()">Квест</button><button onclick="tab='dialog';renderRight()">Диалог</button><button onclick="tab='play';renderRight()">Тест</button></div><div class="glass row"><button class="btn gold" id="toolPan">🖐 Карта</button><button class="btn" id="toolEdit">✦ Редактор</button><button class="btn" id="zin">+</button><button class="btn" id="zout">-</button><button class="btn" id="reset">Сброс</button><button class="btn" id="center">К выбранному</button></div></div><div id="wrap" class="pan"><div id="canvas"><svg id="edges"></svg><div id="nodes"></div></div></div><div class="legend"><span class="chip">основная линия</span><span class="chip blue">диалог</span><span class="chip green">возврат</span><span class="chip red">риск</span><span>H — карта, V — редактор, Space — двигать полотно</span></div></main><aside class="side right"><div class="tab"><button onclick="tab='quest';renderRight()" class="active">Квест</button><button onclick="tab='dialog';renderRight()">Диалог</button><button onclick="tab='play';renderRight()">Тест</button></div><div id="right"></div></aside></div>
<script>
const demo={nodes:[
{id:'q1',type:'quest',x:60,y:360,title:'Пролог: Вернулся один. Не один',act:'Пролог',npc:'Ярн Велис',loc:'Нижние ворота',main:true,summary:'Фиолетовый фонарь показывает правило мира: из Бездны может вернуться не только человек.',obj:['Показать страх быстрых возвращений'],tags:['основа'],need:[],set:['world_return_rule']},
{id:'q2',type:'dialogue',x:360,y:360,title:'Последняя ступень',act:'Часть I',npc:'Страж',loc:'Северные ворота',main:true,summary:'Каэл приходит в Вард-Элен и ищет запись об Эдане.',obj:['Зарегистрироваться у ворот'],tags:['основа'],need:[],set:['kael_registered']},
{id:'q3',type:'dialogue',x:660,y:360,title:'Дом поминовения',act:'Часть I',npc:'Ольма',loc:'Дом поминовения',main:true,summary:'Запись об Эдане существует, но статус не закрыт: он не мёртвый, не удерживаемый и не спорный — пока.',obj:['Проверить книгу пропавших','Узнать про Марру'],tags:['основа'],need:['kael_registered'],set:['edan_not_dead_status']},
{id:'q4',type:'dialogue',x:960,y:360,title:'Марра Соль',act:'Часть I',npc:'Марра Соль',loc:'Трактир',main:true,summary:'Марра говорит, что Эдан остался держать дверь.',obj:['Поговорить с Маррой'],tags:['основа'],need:['edan_not_dead_status'],set:['marra_knows_door']},
{id:'q5',type:'danger',x:1260,y:360,title:'Долг, записанный чужой рукой',act:'Часть I',npc:'Лорн Вейк',loc:'Медный Порог',main:true,summary:'Контракт Эдана превращает поиск брата в экономическую ловушку.',obj:['Узнать сумму долга','Понять роль футляра'],tags:['долг'],need:[],set:['debt_known','case_contract']},
{id:'q6',type:'truth',x:1560,y:360,title:'Якорный лист',act:'Часть II',npc:'Лекарь памяти',loc:'Лавка проверок',main:true,summary:'Игрок узнаёт, что память нужно закреплять до спуска.',obj:['Пройти проверку памяти'],tags:['подготовка'],need:['debt_known'],set:['has_anchor_leaf']},
{id:'q7',type:'danger',x:1860,y:360,title:'Ворота Бездны',act:'Часть III',npc:'Страж ворот',loc:'Нижние ворота',main:true,summary:'Игрок подходит к первому спуску.',obj:['Проверить снаряжение'],tags:['спуск'],need:['has_anchor_leaf'],set:['first_descent_open']},
{id:'q8',type:'quest',x:2160,y:360,title:'Первый Порог',act:'Часть III',npc:'Марра',loc:'Первый Порог',main:true,summary:'Первый урок Бездны: звук, соль, память и чужие следы.',obj:['Следовать за Маррой','Не отвечать голосам'],tags:['аномалии'],need:['first_descent_open'],set:['saw_first_threshold']},
{id:'b1',type:'quest',x:760,y:120,title:'Нижний рынок снаряжения',act:'Ветка',npc:'Старик',loc:'Нижний рынок',main:false,summary:'Боковая сцена про цену первого спуска и личный долг.',obj:['Купить перчатки'],tags:['ветка'],need:[],set:['basic_gear']},
{id:'b2',type:'truth',x:1370,y:120,title:'Аверна Тиль и костяной футляр',act:'Ветка',npc:'Аверна Тиль',loc:'Дом реликвариев',main:false,summary:'Заказчик футляра говорит мягко, но скрывает слишком много.',obj:['Добиться встречи'],tags:['ветка'],need:['case_contract'],set:['averna_interest']}
],links:[['q1','q2','main','новая запись'],['q2','q3','main','поиск Эдана'],['q3','q4','main','найти проводницу'],['q4','q5','main','долг семьи'],['q5','q6','main','подготовка'],['q6','q7','main','к воротам'],['q7','q8','main','первый спуск'],['q4','b1','branch','снаряжение'],['q5','b2','branch','футляр'],['b1','q6','return','к подготовке'],['b2','q6','return','условие']].map((x,i)=>({id:'l'+i,from:x[0],to:x[1],type:x[2],label:x[3]})),dialogs:{q3:[{speaker:'Ольма',text:'Живой, мёртвый, пропавший, удерживаемый или спорный?',choices:[{text:'Пропавший. Я ищу брата.',target:1},{text:'Что значит удерживаемый?',target:2}]},{speaker:'Ольма',text:'Эдан Ринн. Статус: не вернулся. Не мёртвый. Не удерживаемый. Не спорный. Пока.',choices:[{text:'Где найти Марру Соль?',next:'q4',sets:'edan_not_dead_status'}]},{speaker:'Ольма',text:'Значит, Бездна ещё не прислала достаточно доказательств, чтобы назвать его иначе.',choices:[{text:'Вернуться к записи Эдана',target:1}]}],q4:[{speaker:'Марра',text:'Последний раз, когда я видела твоего брата, он был жив.',choices:[{text:'Почему он не вернулся?',target:1}]},{speaker:'Марра',text:'Потому что кто-то должен был держать дверь.',choices:[{text:'Идти дальше',next:'q5',sets:'marra_knows_door'}]}]}};
let state=JSON.parse(localStorage.getItem('bezdna_saitna_v2')||'null')||demo,selected='q3',tab='quest',tool='pan',scale=.55,tx=80,ty=80,space=false,play={q:null,line:0,flags:[],log:[]};const $=id=>document.getElementById(id),wrap=$('wrap'),canvas=$('canvas'),nodesEl=$('nodes'),edges=$('edges'),right=$('right');function node(id){return state.nodes.find(n=>n.id===id)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function save(){localStorage.setItem('bezdna_saitna_v2',JSON.stringify(state))}function split(s){return String(s||'').split(',').map(x=>x.trim()).filter(Boolean)}function setTransform(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;wrap.style.backgroundPosition=`${tx%42}px ${ty%42}px`}function setTool(t){tool=t;$('toolPan').classList.toggle('gold',t==='pan');$('toolEdit').classList.toggle('gold',t==='edit');wrap.className=(t==='pan'||space)?'pan':'edit'}function path(){let n=state.nodes.find(x=>x.main),out=[],seen=new Set;while(n&&!seen.has(n.id)){out.push(n);seen.add(n.id);let l=state.links.find(x=>x.from===n.id&&x.type==='main');n=l?node(l.to):null}return out}
function draw(){nodesEl.innerHTML='';edges.innerHTML='';state.links.forEach(l=>{let a=node(l.from),b=node(l.to);if(!a||!b)return;let x1=a.x+245,y1=a.y+55,x2=b.x,y2=b.y+55,m=(x1+x2)/2,c=l.type==='main'?'#d6a34a':l.type==='return'?'#86ad66':'#72abd1';let p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M ${x1} ${y1} C ${m} ${y1}, ${m} ${y2}, ${x2} ${y2}`);p.setAttribute('stroke',c);p.setAttribute('stroke-width',l.type==='main'?3:2);p.setAttribute('stroke-dasharray',l.type==='main'?'':'4 5');p.setAttribute('fill','none');edges.appendChild(p);let t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',m);t.setAttribute('y',(y1+y2)/2-5);t.setAttribute('fill',c);t.setAttribute('font-size','12');t.setAttribute('text-anchor','middle');t.textContent=l.label;edges.appendChild(t)});state.nodes.forEach(n=>{let d=document.createElement('div');d.className=`node ${n.main?'main':''} ${n.id===selected?'sel':''}`;d.style.left=n.x+'px';d.style.top=n.y+'px';d.innerHTML=`<div class="type">${esc(n.act)}</div><div class="title">${esc(n.title)}</div><div class="desc">${esc(n.summary)}</div><div class="row" style="margin-top:8px"><span class="chip ${n.main?'':'blue'}">${n.main?'основа':'ветка'}</span><span class="chip green">${(state.dialogs[n.id]||[]).length} репл.</span></div>`;d.onpointerdown=e=>startNode(e,n);d.onclick=()=>{selected=n.id;render()};nodesEl.appendChild(d)})}
function renderList(){let q=$('search').value.toLowerCase();$('list').innerHTML=state.nodes.filter(n=>(n.title+n.summary+n.npc).toLowerCase().includes(q)).map(n=>`<div class="mini ${n.id===selected?'sel':''}" onclick="selected='${n.id}';render();center()"><b>${esc(n.title)}</b><div>${esc(n.summary).slice(0,80)}...</div><span class="chip">${n.main?'основа':'ветка'}</span></div>`).join('')}function stats(){let p=path().length;$('stNodes').textContent=p;$('stBranches').textContent=state.nodes.length-p;$('stChoices').textContent=Object.values(state.dialogs).flat().reduce((a,l)=>a+(l.choices||[]).length,0);$('stLinear').textContent=Math.round(p/state.nodes.length*100)+'%'}
function renderRight(){let n=node(selected);if(tab==='dialog')return dialogPanel(n);if(tab==='play')return playPanel();right.innerHTML=`<h2>${esc(n.title)}</h2><p>${esc(n.summary)}</p><label>Название<input id="t" class="field" value="${esc(n.title)}"></label><label>Описание<textarea id="s">${esc(n.summary)}</textarea></label><div class="grid2"><label>NPC<input id="npc" class="field" value="${esc(n.npc)}"></label><label>Локация<input id="loc" class="field" value="${esc(n.loc)}"></label></div><label>Задачи<textarea id="obj">${esc((n.obj||[]).join('\n'))}</textarea></label><div class="grid2"><label>Нужно<input id="need" class="field" value="${esc((n.need||[]).join(', '))}"></label><label>Выдаёт<input id="set" class="field" value="${esc((n.set||[]).join(', '))}"></label></div><label><input id="main" type="checkbox" ${n.main?'checked':''}> основная цепочка</label><div class="row"><button class="btn gold" onclick="saveQuest()">Сохранить</button><button class="btn green" onclick="addNode()">Новый</button><button class="btn red" onclick="delNode()">Удалить</button></div><h2>Связи</h2>${state.links.filter(l=>l.from===n.id||l.to===n.id).map(l=>`<div class="card"><span class="chip">${l.type}</span> ${esc(node(l.from)?.title)} → ${esc(node(l.to)?.title)}</div>`).join('')}`}
window.saveQuest=()=>{let n=node(selected);n.title=$('t').value;n.summary=$('s').value;n.npc=$('npc').value;n.loc=$('loc').value;n.obj=$('obj').value.split('\n').filter(Boolean);n.need=split($('need').value);n.set=split($('set').value);n.main=$('main').checked;save();render()};window.addNode=()=>{let n=node(selected),id='n'+Date.now();state.nodes.push({...n,id,title:'Новый узел',x:n.x+120,y:n.y+140,main:false});state.dialogs[id]=[];selected=id;save();render()};window.delNode=()=>{if(state.nodes.length<2)return;state.nodes=state.nodes.filter(n=>n.id!==selected);state.links=state.links.filter(l=>l.from!==selected&&l.to!==selected);selected=state.nodes[0].id;save();render()};
function dialogPanel(n){let lines=state.dialogs[n.id]||[];right.innerHTML=`<h2>Диалог: ${esc(n.title)}</h2><button class="btn green" onclick="addLine()">+ Реплика</button>${lines.map((l,i)=>`<div class="card"><label>Говорит<input class="field" value="${esc(l.speaker)}" onchange="lUpd(${i},'speaker',this.value)"></label><label>Текст<textarea onchange="lUpd(${i},'text',this.value)">${esc(l.text)}</textarea></label><button class="btn" onclick="addChoice(${i})">+ ответ</button><button class="btn red" onclick="delLine(${i})">удалить</button>${(l.choices||[]).map((c,j)=>`<div class="choice"><label>Ответ<input class="field" value="${esc(c.text)}" onchange="cUpd(${i},${j},'text',this.value)"></label><label>Квест<select onchange="cUpd(${i},${j},'next',this.value)"><option value="">—</option>${state.nodes.map(nn=>`<option value="${nn.id}" ${c.next===nn.id?'selected':''}>${esc(nn.title)}</option>`).join('')}</select></label><label>Выдаёт<input class="field" value="${esc(c.sets||'')}" onchange="cUpd(${i},${j},'sets',this.value)"></label></div>`).join('')}</div>`).join('')}`}
window.addLine=()=>{(state.dialogs[selected]||(state.dialogs[selected]=[])).push({speaker:node(selected).npc,text:'Новая реплика.',choices:[]});save();renderRight()};window.lUpd=(i,k,v)=>{state.dialogs[selected][i][k]=v;save()};window.cUpd=(i,j,k,v)=>{state.dialogs[selected][i].choices[j][k]=v;save()};window.addChoice=i=>{state.dialogs[selected][i].choices.push({text:'Ответ игрока',next:'',sets:''});save();renderRight()};window.delLine=i=>{state.dialogs[selected].splice(i,1);save();renderRight()};
function playPanel(){let q=node(play.q||selected),lines=state.dialogs[q.id]||[],l=lines[play.line]||lines[0];play.q=q.id;right.innerHTML=`<h2>Тест</h2><button class="btn gold" onclick="play={q:selected,line:0,flags:[],log:['Старт: '+node(selected).title]};renderRight()">Старт</button><div class="play">${l?`<b>${esc(l.speaker)}</b><p>${esc(l.text)}</p>${(l.choices||[]).map((c,i)=>`<button class="btn choicebtn" onclick="choose(${i})">${esc(c.text)}</button>`).join('')}`:'Нет реплик'}</div><h2>Флаги</h2><div>${play.flags.map(f=>`<span class="chip green">${f}</span>`).join(' ')}</div><h2>Лог</h2><div class="log">${esc(play.log.join('\n'))}</div>`}window.choose=i=>{let l=(state.dialogs[play.q]||[])[play.line],c=l.choices[i];split(c.sets).forEach(f=>{if(!play.flags.includes(f))play.flags.push(f)});play.log.push(c.text);if(c.next){selected=c.next;play.q=c.next;play.line=0}else play.line++;render()};
function startNode(e,n){if(tool==='pan'||space){startPan(e);return}e.preventDefault();selected=n.id;let sx=e.clientX,sy=e.clientY,ox=n.x,oy=n.y;let move=ev=>{n.x=ox+(ev.clientX-sx)/scale;n.y=oy+(ev.clientY-sy)/scale;draw()};let up=()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up);save();render()};addEventListener('pointermove',move);addEventListener('pointerup',up)}function startPan(e){e.preventDefault();let sx=e.clientX,sy=e.clientY,ox=tx,oy=ty;let move=ev=>{tx=ox+ev.clientX-sx;ty=oy+ev.clientY-sy;setTransform()};let up=()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up)};addEventListener('pointermove',move);addEventListener('pointerup',up)}wrap.addEventListener('pointerdown',e=>{if(e.target===wrap||e.target===canvas||e.target===nodesEl||e.target===edges)startPan(e)});wrap.addEventListener('wheel',e=>{e.preventDefault();let r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,wx=(mx-tx)/scale,wy=(my-ty)/scale;scale=Math.max(.25,Math.min(1.4,scale+(e.deltaY<0?.08:-.08)));tx=mx-wx*scale;ty=my-wy*scale;setTransform()},{passive:false});function center(){let n=node(selected),r=wrap.getBoundingClientRect();tx=r.width/2-(n.x+120)*scale;ty=r.height/2-(n.y+55)*scale;setTransform()}function render(){draw();renderList();stats();renderRight();setTransform()}$('search').oninput=renderList;$('toolPan').onclick=()=>setTool('pan');$('toolEdit').onclick=()=>setTool('edit');$('zin').onclick=()=>{scale=Math.min(1.4,scale+.08);setTransform()};$('zout').onclick=()=>{scale=Math.max(.25,scale-.08);setTransform()};$('reset').onclick=()=>{scale=.55;tx=80;ty=80;setTransform()};$('center').onclick=center;onkeydown=e=>{if(e.target.matches('input,textarea,select'))return;if(e.key.toLowerCase()==='h')setTool('pan');if(e.key.toLowerCase()==='v')setTool('edit');if(e.code==='Space'){space=true;setTool(tool);e.preventDefault()}};onkeyup=e=>{if(e.code==='Space'){space=false;setTool(tool)}};setTool('pan');render();center();
